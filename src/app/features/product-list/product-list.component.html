<section class="list-view">
  <div class="list-view__toolbar">
    <div class="search-placeholder">{{ 'list.searchPlaceholder' | translate }}</div>
  </div>

  @if (loading) {
    <p class="list-view__message">{{ 'list.loading' | translate }}</p>
  } @else if (error) {
    <p class="list-view__message list-view__message--error">
      {{ 'list.error' | translate }}
    </p>
  } @else if (products.length === 0) {
    <p class="list-view__message">{{ 'list.empty' | translate }}</p>
  } @else {
    <div class="product-grid">
      @for (product of products; track product.id) {
        <app-product-item [product]="product" />
      }
    </div>
  }
</section>
